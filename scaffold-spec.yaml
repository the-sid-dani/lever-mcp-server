  - letter: I
    summary: "[Lever-MCP] Slice I (M3b): perform_as resolver + Auth0 wiring + multi-tenant edge cases + JWKS cache"
    sd_sections: ["4 v3 multi-tenant", "10 tigers 1+3+6"]
    what_to_build:
      - "Create `src/auth/perform-as-resolver.ts` — exports `resolve(email: string) → Promise<string>`. Looks up Lever user via `GET /v1/users?email=<email>&perform_as=<bootstrap-id>`. Returns Lever user ID. Wraps in TTL cache (1h)."
      - "Critical invariant: when `OAUTH_ENABLED=true` and resolver returns null (email not found in Lever) → **throw `PerformAsUnresolvedError`** with message 'Your Lever account is not provisioned. Contact Talent team.' Do NOT fall back to `LEVER_DEFAULT_USER_ID`. Fallback to default is ONLY for `OAUTH_ENABLED=false` paths (cron jobs, internal callers)."
      - "Create `src/lever/client-write.ts` — a write-request shim. Reads `perform_as` from the resolver (via request context), attaches as query param on every POST/PUT/DELETE to Lever."
      - "Update `src/auth/middleware.ts` to use `jose.createRemoteJWKSet` with cooldown for JWKS caching (instead of fetching JWKS per-request)."
      - "Add `aud` claim validation: must equal `https://lever-mcp-201626763325.us-central1.run.app`. Add `iss` claim validation against `AUTH0_ISSUER` env."
      - "Develop against the **personal/dev Auth0 tenant** while waiting on prod creds from M0b. Env vars swap at M7."
    ac_items:
      - "`src/auth/perform-as-resolver.ts` exists with TTL cache + fail-loud behavior"
      - "Unit tests cover: cache hit, cache miss + Lever 200, cache miss + Lever 404 (throws PerformAsUnresolvedError), OAUTH_ENABLED=false fallback path"
      - "`src/lever/client-write.ts` exists; every write tool routes through it"
      - "JWKS caching via `createRemoteJWKSet` with 5-minute cooldown"
      - "`aud` + `iss` validation enforced in middleware"
      - "End-to-end test against dev Auth0 tenant: log in as Sid, submit a feedback to a fake opportunity, verify `perform_as` matches Sid's Lever user ID in the request"
      - "Negative test: log in with a Google account NOT in Lever (any non-employee test account in dev tenant) — must return 403 with 'Your Lever account is not provisioned' message"
    blocked_by_letter: H
    blocked_by_note: "depends on M3a (file split provides clean home for new auth modules). Also depends on M0b for PROD credentials, but unblocked for DEV development via personal Auth0 tenant."
    slice_type: AFK

