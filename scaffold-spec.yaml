# ===== Project metadata =====

project_name: Lever MCP Server v3 Refactor
project_prefix: Lever-MCP
project_owner: Sid Dani
project_goal: "Refactor lever-mcp-server to ship feedback submission tools, modernize the auth path to multi-tenant Auth0 + Google Workspace SSO restricted to @samba.tv, eliminate accumulated tech debt since v1, and align with MCP spec 2025-11-25."
audience: "Samba employees with Lever ATS access — Talent Acquisition team (Jordan Lowe + TA partners), hiring managers, recruiters. Primary user today: Sid (single-tenant); multi-tenant unlocked in v3 M3b."
project_status_line: "v3 design locked 2026-05-26. v1 (ATF-435) shipped + live in production. Refactor scoped, ready to execute pending Auth0 IT ticket."
architecture_summary: "Express on GCP Cloud Run (us-central1), MCP SDK 1.29, OAuth 2.1 via Auth0 (Google Workspace Enterprise Connection, @samba.tv-only), Streamable HTTP transport, calling Lever REST API v1. Auth0 issues audience-bound bearer tokens; server validates via JWKS, resolves authenticated email → Lever user ID, attaches as perform_as on writes. Single Cloud Run service, atomic revision deploys, per-milestone rollback via traffic-split."

phases:
  - { label: "v1 LIVE", color: green }
  - { label: "v3 DESIGNED — BUILD PENDING", color: yellow }
  - { label: "IT TICKET FILED", color: yellow }
  - { label: "MULTI-TENANT UNLOCK PENDING", color: neutral }

out_of_scope:
  - "Webhook ingestion sink — M6 ships registration only; sink is a separate future project"
  - "MCP session persistence across Cloud Run revision swaps — move to Redis/Firestore only if multi-user use grows real"
  - "Repo migration from personal github.com/the-sid-dani to Samba org — separate housekeeping project"
  - "Observability beyond M5's structured-logging baseline (Cloud Monitoring dashboard, SLO alerting, p95 tracking) — separate future project"
  - "Cloudflare Access for SaaS as Auth0 alternative — evaluated, rejected for v3 due to Dynamic Client Registration gap; revisit later"

