      - "Verify defense-in-depth: attempt login with a non-@samba.tv Google account — must reject at the Google Workspace Enterprise Connection layer."
    ac_items:
      - "Auth0 tenant provisioned (free tier sufficient for v1)"
      - "API created with audience = `https://lever-mcp-201626763325.us-central1.run.app`, RS256, 12h token lifetime"
      - "Application created — Regular Web App, PKCE S256 only, public client (Token Endpoint Auth Method = None)"
      - "Dynamic Client Registration enabled at tenant level"
      - "Google Workspace Enterprise Connection configured, restricted to samba.tv domain"
      - "Post-Login Action rejects non-@samba.tv emails (defense in depth)"
      - "**Resource Parameter Compatibility Profile** enabled in Tenant Settings > Advanced (RFC 8707 — off by default in Auth0)"
      - "**`authorization_response_iss_parameter_supported: true`** set via Management API (RFC 9207 — off by default)"
      - "Token claims include `email`, `email_verified`, `hd`, `name`, `sub`"
      - "Credentials delivered: AUTH0_DOMAIN, AUTH0_AUDIENCE, AUTH0_ISSUER, JWKS URL, DCR registration endpoint URL, Application client_id"
