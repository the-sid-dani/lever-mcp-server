name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR / branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type-check, test, lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --- Hard gates (must pass to merge) ---

      - name: Type-check (tsc --noEmit)
        run: npm run type-check

      - name: Test (vitest run — full suite)
        run: npm test

      - name: Eval schema gate (Layer-0 tool contract — no secrets)
        run: npm run eval:schema

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Docker build dry-run
        run: docker buildx build --target production -t lever-mcp:ci-dry-run .
        continue-on-error: false

      - name: Secret scan (TruffleHog — verified PR diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      # --- Lint + format are now HARD gates (review cleanup 2026-05-29) ---
      # The lint baseline was cleaned (0 errors; remaining noExplicitAny
      # warnings stay 'warn' and do not fail biome's exit code) and the
      # format baseline normalized. Scoped to src/ so gitignored dist/ does
      # not inflate counts. biome.json root:true makes the local config
      # authoritative.

      - name: Lint (biome — hard gate)
        run: npx biome lint src/

      - name: Format check (biome — hard gate)
        run: npx biome format src/
