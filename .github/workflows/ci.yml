name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR / branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type-check, test, lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --- Hard gates (must pass to merge) ---

      - name: Type-check (tsc --noEmit)
        run: npm run type-check

      - name: Test (vitest run — full suite)
        run: npm test

      # --- Soft gates (report-only until M3a cleanup) ---
      # The codebase has pre-existing biome lint errors + format issues
      # (3 errors + 232 warnings as of 2026-05-26) that predate the v3
      # refactor. Cleaning them in M3a (file split) is the natural moment.
      # Until then, surface lint output for visibility without blocking PRs.
      # After M3a, flip continue-on-error to false to make these hard gates.

      - name: Lint (biome — report-only)
        run: npx biome lint .
        continue-on-error: true

      - name: Format check (biome — report-only)
        run: npx biome format .
        continue-on-error: true
