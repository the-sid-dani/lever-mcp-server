version: 2

# Target refactor/v3 until v3 ships; then remove target-branch so main is trunk.
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "refactor/v3"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "refactor/v3"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "refactor/v3"
    schedule:
      interval: "monthly"
