# Cloud Build configuration for Lever MCP Server
#
# This builds and deploys the MCP server to Cloud Run. The server is its own
# OAuth 2.1 Authorization Server brokering Google Workspace sign-in (no Auth0).
# Deploy with: gcloud builds submit --config cloudbuild.yaml
#
# Prerequisites:
#   1. Create secrets in GCP Secret Manager:
#      - google-oauth-client-id: Google OAuth Web client ID
#      - google-oauth-client-secret: Matching Google OAuth client secret
#      - lever-default-user-id: Default Lever user ID for perform_as write fallback
#   2. Grant Cloud Build service account access to the secrets

substitutions:
  _SERVICE_NAME: lever-mcp
  _REGION: us-central1
  _ARTIFACT_REPO: mcp-servers
  # Image tag. Defaults to "manual" so `gcloud builds submit` works without a
  # git trigger (the built-in $SHORT_SHA is empty on manual submits). Override
  # with --substitutions=_TAG=<sha> for traceability.
  _TAG: manual

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'  # OAuth handles auth now, not IAM
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      # Pinned to a SINGLE warm instance. The OAuth broker holds access tokens +
      # MCP sessions in per-instance memory, so a token minted on one instance
      # 401s if a later request routes to another. min=1 keeps it warm (token
      # survives idle within its 1h TTL); max=1 keeps all requests on the same
      # in-memory store. Revisit (raise max) only after the token store is
      # externalized to Firestore/Redis. Fine for an internal team-scale tool.
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '1'
      - '--timeout'
      - '300s'
      - '--set-secrets'
      - 'LEVER_API_KEY=lever-api-key:latest,GOOGLE_OAUTH_CLIENT_ID=google-oauth-client-id:latest,GOOGLE_OAUTH_CLIENT_SECRET=google-oauth-client-secret:latest,LEVER_DEFAULT_USER_ID=lever-default-user-id:latest'
      - '--set-env-vars'
      - 'NODE_ENV=production,MCP_PUBLIC_URL=https://lever-mcp-201626763325.us-central1.run.app,ALLOWED_HOSTED_DOMAIN=samba.tv,TOKEN_STORE=firestore'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
